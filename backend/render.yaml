services:
  # Backend API
  - type: web
    name: smart-plate-backend
    env: docker
    plan: free
    region: singapore # Change based on your location
    buildCommand: null # Handled by Dockerfile
    startCommand: null # Handled by Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartplate-db
          property: connectionString
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard

databases:
  - name: smartplate-db
    plan: free
    region: singapore
