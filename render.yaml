services:
  # Backend API
  - type: web
    name: smart-plate-backend
    env: docker
    plan: free
    dockerContext: backend  # Very important!
    dockerfilePath: Dockerfile 
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartplate-db
          property: connectionString
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: smartplate-db
    plan: free
    region: singapore
